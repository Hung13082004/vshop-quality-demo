name: V-Shop 12/12 Deployment Pipeline

on: [push, pull_request]

jobs:
  commit-stage:
    runs-on: ubuntu-latest
    steps:
    - name: 1. Checkout Code
      uses: actions/checkout@v3

    - name: 2. Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: 3. Chạy Unit Test kiểm tra lỗi
      run: mvn -B test

    # THÊM BƯỚC NÀY ĐỂ ĐÁP ỨNG ĐÚNG YÊU CẦU "ĐÓNG GÓI" CỦA CÔ
    - name: 4. Đóng gói Bản Ứng viên (Release Candidate)
      run: mvn -B package